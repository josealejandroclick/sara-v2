<!--
SAM WEBCHAT WIDGET
==================
Widget embebible para landing pages de Noxo Solutions.
Se conecta al webhook_server de Sam (canal webhook).

CÓMO USAR:
Agrega esta línea al final del <body> de cualquier landing page:

<script src="https://tu-dominio.com/sam-widget.js" 
  data-server="https://sam.tudominio.com"
  data-agent="Salud Segura"
  data-color="#0ea5e9">
</script>

O sirve este archivo HTML directamente y embébelo con un iframe.
-->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam Webchat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --sam-primary: #0ea5e9;
  --sam-primary-dark: #0284c7;
  --sam-bg: #ffffff;
  --sam-bg-chat: #f8fafc;
  --sam-text: #1e293b;
  --sam-text-light: #64748b;
  --sam-border: #e2e8f0;
  --sam-user-bubble: #0ea5e9;
  --sam-bot-bubble: #ffffff;
  --sam-shadow: 0 20px 60px rgba(0,0,0,0.15);
  --sam-radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: transparent;
}

/* ========== BOTÓN FLOTANTE ========== */
.sam-fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--sam-primary);
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(14, 165, 233, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 9999;
}
.sam-fab:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 28px rgba(14, 165, 233, 0.5);
}
.sam-fab svg { width: 28px; height: 28px; fill: white; }
.sam-fab.open svg.chat-icon { display: none; }
.sam-fab:not(.open) svg.close-icon { display: none; }

/* Pulso de atención */
.sam-fab::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: var(--sam-primary);
  opacity: 0;
  animation: sam-pulse 3s ease-in-out infinite;
}
.sam-fab.open::after { animation: none; }

@keyframes sam-pulse {
  0%, 100% { transform: scale(1); opacity: 0; }
  50% { transform: scale(1.4); opacity: 0.2; }
}

/* Badge de notificación */
.sam-fab .badge {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #ef4444;
  color: white;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s;
}
.sam-fab .badge.show { opacity: 1; }

/* ========== VENTANA DE CHAT ========== */
.sam-window {
  position: fixed;
  bottom: 96px;
  right: 24px;
  width: 380px;
  max-width: calc(100vw - 32px);
  height: 560px;
  max-height: calc(100vh - 120px);
  background: var(--sam-bg);
  border-radius: var(--sam-radius);
  box-shadow: var(--sam-shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 9998;
  opacity: 0;
  transform: translateY(16px) scale(0.96);
  pointer-events: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.sam-window.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: all;
}

/* Header */
.sam-header {
  padding: 16px 20px;
  background: var(--sam-primary);
  color: white;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.sam-header .avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.sam-header .info h3 {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.2;
}
.sam-header .info p {
  font-size: 12px;
  opacity: 0.85;
  line-height: 1.3;
}

/* Mensajes */
.sam-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: var(--sam-bg-chat);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sam-messages::-webkit-scrollbar { width: 4px; }
.sam-messages::-webkit-scrollbar-thumb {
  background: var(--sam-border);
  border-radius: 4px;
}

.sam-msg {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  animation: sam-fade-in 0.3s ease;
}
@keyframes sam-fade-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.sam-msg.bot {
  align-self: flex-start;
  background: var(--sam-bot-bubble);
  color: var(--sam-text);
  border: 1px solid var(--sam-border);
  border-bottom-left-radius: 4px;
}
.sam-msg.user {
  align-self: flex-end;
  background: var(--sam-user-bubble);
  color: white;
  border-bottom-right-radius: 4px;
}

/* Typing indicator */
.sam-typing {
  display: none;
  align-self: flex-start;
  padding: 10px 16px;
  background: var(--sam-bot-bubble);
  border: 1px solid var(--sam-border);
  border-radius: 14px;
  border-bottom-left-radius: 4px;
  gap: 4px;
}
.sam-typing.show { display: flex; }
.sam-typing span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--sam-text-light);
  animation: sam-dot 1.4s ease-in-out infinite;
}
.sam-typing span:nth-child(2) { animation-delay: 0.2s; }
.sam-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes sam-dot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Input */
.sam-input-area {
  padding: 12px 16px;
  background: var(--sam-bg);
  border-top: 1px solid var(--sam-border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.sam-input-area input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--sam-border);
  border-radius: 24px;
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.sam-input-area input:focus {
  border-color: var(--sam-primary);
}
.sam-input-area button {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--sam-primary);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  flex-shrink: 0;
}
.sam-input-area button:hover { background: var(--sam-primary-dark); }
.sam-input-area button:disabled { background: var(--sam-border); cursor: not-allowed; }
.sam-input-area button svg { width: 18px; height: 18px; fill: white; }

/* Powered by */
.sam-footer {
  padding: 6px;
  text-align: center;
  font-size: 10px;
  color: var(--sam-text-light);
  background: var(--sam-bg);
}

/* Mobile */
@media (max-width: 480px) {
  .sam-window {
    bottom: 0;
    right: 0;
    width: 100vw;
    height: 100vh;
    max-height: 100vh;
    border-radius: 0;
  }
  .sam-fab { bottom: 16px; right: 16px; }
}
</style>
</head>
<body>

<!-- FAB Button -->
<button class="sam-fab" id="samFab" onclick="toggleChat()">
  <svg class="chat-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
  <svg class="close-icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  <div class="badge" id="samBadge">1</div>
</button>

<!-- Chat Window -->
<div class="sam-window" id="samWindow">
  <div class="sam-header">
    <div class="avatar">💬</div>
    <div class="info">
      <h3 id="samHeaderName">Sam</h3>
      <p id="samHeaderDesc">Asistente de Seguros de Salud</p>
    </div>
  </div>
  
  <div class="sam-messages" id="samMessages">
    <div class="sam-msg bot">
      ¡Hola! 👋 Soy Sam, tu asistente de seguros de salud. ¿En qué puedo ayudarte hoy?
    </div>
  </div>
  
  <div class="sam-typing" id="samTyping">
    <span></span><span></span><span></span>
  </div>
  
  <div class="sam-input-area">
    <input type="text" id="samInput" placeholder="Escribe tu mensaje..." 
           onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="samSend" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  
  <div class="sam-footer">
    Powered by Sam · Noxo Solutions
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// Leer de data-attributes del script tag o usar defaults
// ============================================================
const CONFIG = {
  server: document.currentScript?.getAttribute('data-server') || 'http://localhost:8085',
  agent: document.currentScript?.getAttribute('data-agent') || 'Sam',
  color: document.currentScript?.getAttribute('data-color') || '#0ea5e9',
  description: document.currentScript?.getAttribute('data-desc') || 'Asistente de Seguros de Salud',
};

// Aplicar color personalizado
if (CONFIG.color !== '#0ea5e9') {
  document.documentElement.style.setProperty('--sam-primary', CONFIG.color);
}
document.getElementById('samHeaderName').textContent = CONFIG.agent;
document.getElementById('samHeaderDesc').textContent = CONFIG.description;

// Session ID único por visitante (persiste en el navegador)
let sessionId = localStorage.getItem('sam_session_id');
if (!sessionId) {
  sessionId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
  localStorage.setItem('sam_session_id', sessionId);
}

let isOpen = false;
let isWaiting = false;

// ============================================================
// FUNCIONES
// ============================================================

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('samWindow').classList.toggle('open', isOpen);
  document.getElementById('samFab').classList.toggle('open', isOpen);
  document.getElementById('samBadge').classList.remove('show');
  
  if (isOpen) {
    document.getElementById('samInput').focus();
  }
}

function addMessage(text, role) {
  const container = document.getElementById('samMessages');
  const msg = document.createElement('div');
  msg.className = `sam-msg ${role}`;
  msg.textContent = text;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function setTyping(show) {
  document.getElementById('samTyping').classList.toggle('show', show);
  if (show) {
    const container = document.getElementById('samMessages');
    container.scrollTop = container.scrollHeight;
  }
}

async function sendMessage() {
  const input = document.getElementById('samInput');
  const texto = input.value.trim();
  
  if (!texto || isWaiting) return;
  
  // Mostrar mensaje del usuario
  addMessage(texto, 'user');
  input.value = '';
  
  // Mostrar typing
  isWaiting = true;
  setTyping(true);
  document.getElementById('samSend').disabled = true;
  
  try {
    // Enviar al webhook server de Sam
    const response = await fetch(`${CONFIG.server}/webhook`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        texto: texto,
        canal: 'webchat',
        nombre: '' // podría pedirlo al inicio
      })
    });
    
    const data = await response.json();
    
    setTyping(false);
    
    if (data.respuesta) {
      addMessage(data.respuesta, 'bot');
    } else if (data.error) {
      addMessage('Disculpa, tuve un problema. ¿Podrías intentar de nuevo?', 'bot');
    }
    
  } catch (error) {
    setTyping(false);
    addMessage('No pude conectarme. Por favor intenta de nuevo en un momento.', 'bot');
    console.error('Sam webchat error:', error);
  }
  
  isWaiting = false;
  document.getElementById('samSend').disabled = false;
  input.focus();
}

// Mostrar badge después de 5 segundos si no han abierto el chat
setTimeout(() => {
  if (!isOpen) {
    document.getElementById('samBadge').classList.add('show');
  }
}, 5000);
</script>

</body>
</html>
